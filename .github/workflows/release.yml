name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Determine release tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Linux and Windows executables
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/Roster-Generator-Go-linux-amd64 ./...
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/Roster-Generator-Go-windows-amd64.exe ./...

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/Roster-Generator-Go-linux-amd64
            dist/Roster-Generator-Go-windows-amd64.exe
          body: "Release ${{ env.RELEASE_TAG }}: Linux and Windows executables for Roster Generator."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
