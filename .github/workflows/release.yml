name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Determine release tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Linux and Windows executables
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/Roster-Generator-Go-linux-amd64 ./...
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/Roster-Generator-Go-windows-amd64.exe ./...

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: ${{ env.RELEASE_TAG }}
          body: "Release ${{ env.RELEASE_TAG }}: Linux and Windows executables for Roster Generator."
          draft: false
          prerelease: false

      - name: Upload Linux asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/Roster-Generator-Go-linux-amd64
          asset_name: Roster-Generator-Go-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/Roster-Generator-Go-windows-amd64.exe
          asset_name: Roster-Generator-Go-windows-amd64.exe
          asset_content_type: application/octet-stream
